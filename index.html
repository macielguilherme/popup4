<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Aviso do Sistema - DocZ</title>
    <style>
        /* CSS Base DocZ */
        html, body { margin: 0; padding: 0; background: #fafafa; font-family: Arial, sans-serif; color: #595959; font-size: 12px; }
        
        /* Fundo escuro para a modal */
        #termo-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; }
        
        /* Estrutura da Popup */
        .ui-dialog { background: #585858; padding: 5px; border-radius: 5px; width: 450px; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .ui-dialog-titlebar { background: url("https://docz.sosdocs.com.br/Docz/app/images/backgrounds/titleBg.png") repeat-x; height: 36px; display: flex; justify-content: space-between; align-items: center; padding: 0 10px; border-bottom: 1px solid #cdcdcd; }
        .ui-dialog-title { font-weight: bold; color: #595959; font-size: 12px; }
        
        /* Conteúdo interno da Popup */
        .ui-dialog-content { background-color: #fafafa; padding: 25px 20px 20px 20px; text-align: center; border-radius: 0 0 3px 3px; }
        
        /* Estilo da mensagem */
        .alert-message { font-size: 13px; line-height: 1.5; color: #444; margin-bottom: 25px; padding: 0 10px; }
        
        /* Ícone de sucesso (usando caractere para simplificar, mas você pode trocar por uma img do seu sistema) */
        .icon-success { font-size: 36px; color: #7ca82a; margin-bottom: 15px; display: block; }

        /* Botão Padrão do Sistema */
        .button { 
            font-size: 11px; 
            font-weight: bold; 
            background-image: url("https://docz.sosdocs.com.br/Docz/app/images/ui/usualButtons.png"); 
            background-repeat: repeat-x; 
            text-transform: uppercase; 
            cursor: pointer; 
            padding: 8px 30px; 
            border-radius: 2px; 
            color: #fff; 
            border: 1px solid #7ca82a; 
            background-position: 0 -425px; 
            display: inline-block;
            text-decoration: none;
        }
        
        .button:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div id="termo-backdrop">
    <div class="ui-dialog">
        <div class="ui-dialog-titlebar">
            <span class="ui-dialog-title">Aviso do Sistema</span>
            <span style="cursor:pointer; color:#595959; font-weight:bold;">✖</span>
        </div>

        <div class="ui-dialog-content">
            <span class="icon-success">✔</span>
            
            <div class="alert-message">
                As assinaturas foram devidamente validadas.<br>
                Clique no ícone de <strong>Histórico de Assinaturas</strong> para ver os detalhes.
            </div>

            <button class="button" onclick="fecharPopup()">OK, ENTENDI</button>
        </div>
    </div>
</div>

<script>
    // Função simples para fechar a popup (esconde o backdrop)
    function fecharPopup() {
        document.getElementById('termo-backdrop').style.display = 'none';
    }
</script>

</body>
</html>
